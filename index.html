<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0D0A12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tripotevisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TRIPOTEVISOR — Design System
   Palette : Encre #0D0A12 · Velours #171021 · Champagne #D8B98A
             Prune #7C3A5E · Orchidée #B06A8F · Brume #9C93A8
   ============================================================ */
:root{
  --ink:#0D0A12; --velvet:#171021; --velvet-2:#1F1730; --glass:rgba(255,255,255,.055);
  --glass-2:rgba(255,255,255,.09); --line:rgba(255,255,255,.08);
  --champagne:#D8B98A; --champagne-soft:#E9D6B4; --plum:#7C3A5E; --orchid:#B06A8F;
  --grad-brand:linear-gradient(135deg,#8A3B58 0%,#5A2B57 55%,#3A2350 100%);
  --grad-gold:linear-gradient(120deg,#E9D6B4,#C9A26B);
  --txt:#F0EAF4; --muted:#9C93A8; --dim:#6B6278;
  --ok:#7FC7A4; --warn:#E0A458; --bad:#D96C6C;
  --r-lg:22px; --r-md:16px; --r-sm:11px;
  --shadow:0 18px 40px -18px rgba(0,0,0,.75);
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink); color:var(--txt);
  font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-weight:300; letter-spacing:.01em; overflow:hidden;
  -webkit-font-smoothing:antialiased; user-select:none;
}
body::before{ /* halo ambiant */
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(60% 40% at 80% -5%, rgba(124,58,94,.28), transparent 60%),
    radial-gradient(50% 35% at 5% 100%, rgba(58,35,80,.35), transparent 60%);
}
#app{position:relative;z-index:1;height:100%;max-width:520px;margin:0 auto;display:flex;flex-direction:column}
@media(min-width:560px){
  #app{height:calc(100% - 40px);margin-top:20px;border:1px solid var(--line);border-radius:34px;overflow:hidden;box-shadow:var(--shadow)}
}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
h1,h2,h3{font-weight:400}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:inherit;color:var(--txt);background:var(--glass);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;font-size:16px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--orchid)}
::placeholder{color:var(--dim)}
.hidden{display:none!important}

/* ---------- primitives ---------- */
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--champagne);font-weight:500}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border-radius:999px;font-size:15px;font-weight:500;letter-spacing:.03em;transition:transform .15s,opacity .2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--grad-brand);color:#fff;box-shadow:0 10px 30px -10px rgba(138,59,88,.6)}
.btn-gold{background:var(--grad-gold);color:#2A1B10;font-weight:600}
.btn-ghost{background:var(--glass);border:1px solid var(--line)}
.btn-sm{width:auto;padding:10px 18px;font-size:13px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;background:var(--glass);border:1px solid var(--line);font-size:13px;color:var(--muted);transition:all .2s;cursor:pointer}
.chip.on{background:rgba(176,106,143,.18);border-color:var(--orchid);color:var(--txt)}
.card{background:var(--glass);border:1px solid var(--line);border-radius:var(--r-lg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.divider{height:1px;background:var(--line);margin:18px 0}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:500;letter-spacing:.05em;padding:4px 9px;border-radius:999px;background:rgba(216,185,138,.14);color:var(--champagne);border:1px solid rgba(216,185,138,.25)}
.badge.verif{background:rgba(127,199,164,.12);color:var(--ok);border-color:rgba(127,199,164,.3)}
.dot-online{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);display:inline-block}

/* ---------- avatars médaillons ---------- */
.ava{position:relative;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Cormorant Garamond',serif;font-weight:500;color:rgba(255,255,255,.92);border:1.5px solid rgba(255,255,255,.18);text-shadow:0 1px 4px rgba(0,0,0,.4)}
.ava::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(216,185,138,.28)}
.ava.lg{width:120px;height:120px;font-size:44px}
.ava.md{width:56px;height:56px;font-size:22px}
.ava.sm{width:44px;height:44px;font-size:17px}
.ava .st{position:absolute;bottom:2px;right:2px;width:12px;height:12px;border-radius:50%;background:var(--ok);border:2.5px solid var(--ink)}

/* ---------- screens & nav ---------- */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:transparent;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .28s ease,transform .28s ease;overflow:hidden}
.screen.active{opacity:1;pointer-events:auto;transform:none}
.scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:0 20px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sat) + 16px) 20px 12px}
.topbar .logo{font-family:'Cormorant Garamond',serif;font-size:19px;letter-spacing:.09em;background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent}
.icon-btn{position:relative;width:42px;height:42px;border-radius:50%;background:var(--glass);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:17px}
.icon-btn .pip{position:absolute;top:6px;right:6px;width:9px;height:9px;border-radius:50%;background:var(--orchid);border:2px solid var(--ink)}

#tabbar{position:relative;display:flex;justify-content:space-around;padding:10px 8px calc(var(--sab) + 12px);background:rgba(13,10,18,.82);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid var(--line)}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;letter-spacing:.06em;color:var(--dim);padding:4px 10px;position:relative;transition:color .2s}
.tab .ti{font-size:21px;filter:grayscale(1) opacity(.55);transition:filter .2s,transform .2s}
.tab.on{color:var(--champagne)}
.tab.on .ti{filter:none;transform:translateY(-2px)}
.tab .cnt{position:absolute;top:-2px;right:2px;min-width:17px;height:17px;border-radius:9px;background:var(--orchid);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ---------- onboarding ---------- */
#gate{justify-content:flex-end;background:radial-gradient(90% 70% at 50% 0%,#2A1838 0%,var(--ink) 70%)}
.gate-inner{padding:0 28px calc(var(--sab) + 34px)}
.monogram{width:88px;height:88px;border-radius:50%;border:1px solid rgba(216,185,138,.5);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-family:'Cormorant Garamond',serif;font-size:46px;color:var(--champagne);position:relative}
.monogram::after{content:"";position:absolute;inset:-9px;border-radius:50%;border:1px solid rgba(216,185,138,.18)}
.ob-progress{display:flex;gap:5px;padding:calc(var(--sat) + 18px) 24px 6px}
.ob-progress i{flex:1;height:3px;border-radius:2px;background:var(--glass-2);transition:background .3s}
.ob-progress i.done{background:var(--grad-gold)}
.ob-step{flex:1;display:flex;flex-direction:column;padding:22px 26px calc(var(--sab) + 22px);overflow-y:auto}
.ob-step h2{font-family:'Cormorant Garamond',serif;font-size:31px;line-height:1.15;margin:8px 0 6px}
.ob-step .sub{color:var(--muted);font-size:14.5px;line-height:1.5;margin-bottom:24px}
.ob-foot{margin-top:auto;padding-top:20px;display:flex;gap:12px}
.opt-card{display:flex;align-items:center;gap:14px;padding:17px;border-radius:var(--r-md);background:var(--glass);border:1.5px solid var(--line);margin-bottom:12px;transition:all .2s;cursor:pointer}
.opt-card.on{border-color:var(--orchid);background:rgba(176,106,143,.13)}
.opt-card .oi{font-size:26px}
.opt-card b{display:block;font-weight:500;font-size:15.5px}
.opt-card span{font-size:13px;color:var(--muted)}
.chips-wrap{display:flex;flex-wrap:wrap;gap:9px}
.photo-slot{aspect-ratio:3/4;border-radius:var(--r-md);border:1.5px dashed rgba(255,255,255,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--dim);font-size:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.photo-slot.filled{border-style:solid;border-color:var(--line);color:#fff}
.photo-slot .main-tag{position:absolute;bottom:8px;left:8px}

/* ---------- discovery / swipe ---------- */
#deck{position:relative;flex:1;margin:6px 20px 14px}
.sw-card{position:absolute;inset:0;border-radius:26px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:flex-end;touch-action:none;background:#241A33;transition:transform .35s cubic-bezier(.2,.8,.3,1),opacity .3s;will-change:transform}
.sw-card.dragging{transition:none}
.sw-visu{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.sw-visu .big-ini{font-family:'Cormorant Garamond',serif;font-size:120px;color:rgba(255,255,255,.85);text-shadow:0 4px 30px rgba(0,0,0,.4)}
.sw-veil{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(10,7,15,.88) 92%)}
.sw-info{position:relative;padding:20px 20px 18px;display:flex;flex-direction:column;gap:8px}
.sw-name{font-family:'Cormorant Garamond',serif;font-size:29px;display:flex;align-items:baseline;gap:9px}
.sw-name small{font-size:19px;color:var(--champagne-soft)}
.sw-meta{display:flex;flex-wrap:wrap;gap:7px;font-size:12px;color:var(--muted)}
.sw-meta .m{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.35);padding:5px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.09)}
.stamp{position:absolute;top:26px;font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.2em;padding:8px 20px;border:2px solid;border-radius:10px;transform:rotate(-12deg);opacity:0;text-transform:uppercase}
.stamp.like{left:20px;color:var(--ok);border-color:var(--ok)}
.stamp.nope{right:20px;color:var(--bad);border-color:var(--bad);transform:rotate(12deg)}
.deck-actions{display:flex;justify-content:center;align-items:center;gap:18px;padding:0 20px 16px}
.act{width:58px;height:58px;border-radius:50%;background:var(--glass);border:1px solid var(--line);font-size:24px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);transition:transform .15s}
.act:active{transform:scale(.88)}
.act.big{width:70px;height:70px;font-size:29px;background:var(--grad-brand);border:none;box-shadow:0 12px 30px -8px rgba(138,59,88,.7)}
.act.gold{color:var(--champagne)}

/* ---------- listes & sections ---------- */
.sec-title{display:flex;align-items:baseline;justify-content:space-between;margin:22px 0 12px}
.sec-title h3{font-family:'Cormorant Garamond',serif;font-size:22px}
.sec-title button{font-size:12.5px;color:var(--champagne)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mini-card{border-radius:var(--r-md);overflow:hidden;border:1px solid var(--line);position:relative;aspect-ratio:3/4;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer}
.mini-card .mv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:52px;color:rgba(255,255,255,.85)}
.mini-card .mveil{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(10,7,15,.9))}
.mini-card .mi{position:relative;padding:12px;font-size:14px}
.mini-card .mi small{display:block;color:var(--muted);font-size:11.5px;margin-top:2px}
.row-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);cursor:pointer}
.row-item .rc{flex:1;min-width:0}
.row-item .rc b{font-weight:500;font-size:15px;display:flex;align-items:center;gap:7px}
.row-item .rc p{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.row-item .rt{text-align:right;font-size:11.5px;color:var(--dim);display:flex;flex-direction:column;align-items:flex-end;gap:6px}

/* ---------- chat ---------- */
.chat-head{display:flex;align-items:center;gap:12px;padding:calc(var(--sat) + 12px) 16px 12px;border-bottom:1px solid var(--line);background:rgba(13,10,18,.7);backdrop-filter:blur(18px)}
.chat-body{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:10px}
.bub{max-width:76%;padding:11px 15px;border-radius:18px;font-size:14.5px;line-height:1.45;font-weight:400;position:relative;animation:pop .25s ease}
.bub.me{align-self:flex-end;background:var(--grad-brand);border-bottom-right-radius:6px}
.bub.them{align-self:flex-start;background:var(--glass-2);border:1px solid var(--line);border-bottom-left-radius:6px}
.bub time{display:block;font-size:10px;opacity:.55;margin-top:4px;text-align:right}
.chat-day{align-self:center;font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin:8px 0}
.composer{display:flex;gap:10px;align-items:flex-end;padding:12px 14px calc(var(--sab) + 14px);border-top:1px solid var(--line);background:rgba(13,10,18,.8);backdrop-filter:blur(18px)}
.composer input{flex:1;border-radius:999px;padding:13px 18px}
.send{width:46px;height:46px;border-radius:50%;background:var(--grad-brand);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(.97)}}

/* ---------- overlays ---------- */
.sheet-wrap{position:absolute;inset:0;z-index:50;display:flex;align-items:flex-end;background:rgba(5,3,9,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-wrap.open{opacity:1;pointer-events:auto}
.sheet{width:100%;max-height:88%;overflow-y:auto;background:var(--velvet-2);border-radius:26px 26px 0 0;border-top:1px solid var(--line);padding:14px 22px calc(var(--sab) + 26px);transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.8,.25,1)}
.sheet-wrap.open .sheet{transform:none}
.sheet .grip{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);margin:0 auto 16px}
.modal-wrap{position:absolute;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(5,3,9,.72);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s;padding:28px}
.modal-wrap.open{opacity:1;pointer-events:auto}
.modal{width:100%;background:var(--velvet-2);border:1px solid var(--line);border-radius:24px;padding:26px 22px;transform:scale(.94);transition:transform .28s;text-align:center}
.modal-wrap.open .modal{transform:none}
#toast{position:absolute;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);background:rgba(30,22,42,.95);border:1px solid var(--line);border-radius:999px;padding:12px 22px;font-size:13.5px;opacity:0;transition:all .3s;z-index:80;white-space:nowrap;backdrop-filter:blur(10px);box-shadow:var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* match overlay */
#matchfx{position:absolute;inset:0;z-index:70;background:radial-gradient(80% 60% at 50% 30%,rgba(124,58,94,.55),rgba(13,10,18,.97));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;opacity:0;pointer-events:none;transition:opacity .35s}
#matchfx.open{opacity:1;pointer-events:auto}
#matchfx .duo{display:flex;gap:-10px}
#matchfx .duo .ava{margin:0 -12px;animation:float 3s ease-in-out infinite}
#matchfx .duo .ava:last-child{animation-delay:1.5s}
#matchfx h2{font-family:'Cormorant Garamond',serif;font-size:42px;font-style:italic;background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent}
@keyframes float{50%{transform:translateY(-8px)}}

/* skeleton */
.skel{background:linear-gradient(100deg,var(--glass) 40%,var(--glass-2) 50%,var(--glass) 60%);background-size:200% 100%;animation:sk 1.3s infinite;border-radius:var(--r-md)}
@keyframes sk{to{background-position:-200% 0}}

/* paywall */
.tier{border-radius:var(--r-lg);border:1.5px solid var(--line);padding:20px;margin-bottom:14px;position:relative;background:var(--glass);cursor:pointer;transition:all .2s;text-align:left}
.tier.on{border-color:var(--champagne);background:rgba(216,185,138,.07)}
.tier .price{font-family:'Cormorant Garamond',serif;font-size:30px}
.tier .price small{font-size:14px;color:var(--muted);font-family:'Outfit'}
.tier ul{list-style:none;margin-top:10px}
.tier li{font-size:13.5px;color:var(--muted);padding:4px 0 4px 22px;position:relative}
.tier li::before{content:"✦";position:absolute;left:2px;color:var(--champagne);font-size:11px}
.tier .reco{position:absolute;top:-10px;right:16px}

/* settings */
.set-row{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--line);gap:14px}
.set-row b{font-weight:400;font-size:14.5px;display:block}
.set-row span{font-size:12px;color:var(--dim)}
.sw{width:48px;height:28px;border-radius:14px;background:var(--glass-2);border:1px solid var(--line);position:relative;flex-shrink:0;transition:background .25s;cursor:pointer}
.sw::after{content:"";position:absolute;top:2.5px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .25s}
.sw.on{background:var(--plum)}
.sw.on::after{transform:translateX(19px)}

/* radar / zones */
.radar{position:relative;height:230px;border-radius:var(--r-lg);border:1px solid var(--line);overflow:hidden;background:radial-gradient(circle at 50% 50%,#221735 0%,#120D1C 70%)}
.radar .ring{position:absolute;left:50%;top:50%;border-radius:50%;border:1px solid rgba(216,185,138,.14);transform:translate(-50%,-50%)}
.radar .sweep{position:absolute;left:50%;top:50%;width:50%;height:50%;transform-origin:0 0;background:conic-gradient(from 0deg,rgba(216,185,138,.22),transparent 70deg);animation:sweep 4.5s linear infinite}
@keyframes sweep{to{transform:rotate(360deg)}}
.radar .blip{position:absolute;transform:translate(-50%,-50%);cursor:pointer}
.radar .me-dot{position:absolute;left:50%;top:50%;width:12px;height:12px;border-radius:50%;background:var(--champagne);transform:translate(-50%,-50%);box-shadow:0 0 14px var(--champagne)}
.zone-bar{height:7px;border-radius:4px;background:var(--glass-2);overflow:hidden;flex:1}
.zone-bar i{display:block;height:100%;background:var(--grad-gold);border-radius:4px}

/* discret mode */
#discret{position:absolute;inset:0;z-index:200;background:#F5F4F0;color:#2B2B2B;font-family:-apple-system,'Segoe UI',sans-serif;display:none;flex-direction:column;padding:calc(var(--sat) + 24px) 22px}
#discret.open{display:flex}
#discret h1{font-size:26px;font-weight:700;margin-bottom:4px}
#discret .task{display:flex;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid #E4E2DC;font-size:15px}
#discret .cb{width:22px;height:22px;border-radius:7px;border:1.5px solid #C9C6BE}
#discret .cb.d{background:#3D7A5C;border-color:#3D7A5C;position:relative}
#discret .cb.d::after{content:"✓";color:#fff;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px}

.empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:60px 30px;text-align:center;color:var(--muted)}
.empty .ei{font-size:40px;opacity:.5}
.empty b{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--txt);font-weight:500}
.empty p{font-size:13.5px;line-height:1.5}
.seg{display:flex;background:var(--glass);border:1px solid var(--line);border-radius:999px;padding:4px;margin:4px 0 6px}
.seg button{flex:1;padding:9px;border-radius:999px;font-size:13px;color:var(--muted);transition:all .2s}
.seg button.on{background:var(--velvet-2);color:var(--txt);box-shadow:0 4px 12px rgba(0,0,0,.3)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <div id="toast"></div>
  <div id="screens"></div>
  <div id="tabbar" class="hidden"></div>
  <div id="matchfx"></div>
  <div class="sheet-wrap" id="sheetWrap"><div class="sheet" id="sheetBox"></div></div>

function makeCard(p,top){
  const el=document.createElement("div");
  el.className="sw-card";el.dataset.pid=p.id;
  el.style.background=grad(p);
  if(!top)el.style.transform=`scale(${.955}) translateY(-12px)`;

    <div class="sw-info">
      <div style="display:flex;gap:8px;align-items:center">${badges(p)}${p.online&&S.settings.online?'<span class="badge" style="background:rgba(127,199,164,.1);color:var(--ok);border-color:transparent"><span class="dot-online"></span> En ligne</span>':""}</div>
      <div class="sw-name">${esc(p.pseudo)} <small>${p.age}</small></div>
      <div class="sw-meta">
        <span class="m">${p.type==="couple"?"👥":"👤"} ${typeLabel(p)}</span>

        <span class="m">🕐 ${p.dispo}</span>
      </div>
      <p style="font-size:13px;color:rgba(255,255,255,.75);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(p.bio)}</p>
    </div>`;
  if(top)attachDrag(el,p);
  el.addEventListener("click",e=>{if(!el._moved)openProfile(p.id)});
  return el;
}
function attachDrag(el,p){
  let x0=0,y0=0,dx=0;
  const start=e=>{el.classList.add("dragging");const t=e.touches?e.touches[0]:e;x0=t.clientX;y0=t.clientY;el._moved=false;
    window.addEventListener("pointermove",move);window.addEventListener("pointerup",end);
    window.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",end)};
  const move=e=>{const t=e.touches?e.touches[0]:e;dx=t.clientX-x0;const dy=t.clientY-y0;
    if(Math.abs(dx)>6)el._moved=true;
    el.style.transform=`translate(${dx}px,${dy*.3}px) rotate(${dx/18}deg)`;
    el.querySelector(".stamp.like").style.opacity=Math.max(0,dx/90);
    el.querySelector(".stamp.nope").style.opacity=Math.max(0,-dx/90);
    if(e.cancelable)e.preventDefault()};
  const end=()=>{window.removeEventListener("pointermove",move);window.removeEventListener("pointerup",end);
    window.removeEventListener("touchmove",move);window.removeEventListener("touchend",end);
    el.classList.remove("dragging");
    if(dx>110)doSwipe(p,true,el);else if(dx<-110)doSwipe(p,false,el);
    else{el.style.transform="";el.querySelectorAll(".stamp").forEach(s=>s.style.opacity=0)}
    dx=0};
  el.addEventListener("pointerdown",start);el.addEventListener("touchstart",start,{passive:true});
}
function swipe(like){const top=$("#deck .sw-card:last-child");if(!top)return;doSwipe(P(+top.dataset.pid),like,top)}
function doSwipe(p,like,el){
  if(like&&S.plan==="free"&&S.likesLeft<=0){el.style.transform="";openPaywall("Plus de likes aujourd'hui");return}
  el.style.transform=`translate(${like?1:-1}00vw, -40px) rotate(${like?18:-18}deg)`;el.style.opacity=0;
  setTimeout(()=>{
    if(like){S.likes.push(p.id);if(S.plan==="free")S.likesLeft--;
      if(p.id%2===0||p.online){S.matches.includes(p.id)||S.matches.push(p.id);save();showMatch(p);return}}
    else S.passed.push(p.id);
    save();renderDisco();
  },300);
}

function proxHTML(){

  const zones=[["Marne-la-Vallée",near.filter(p=>p.km<10).length,80],["Meaux & alentours",near.filter(p=>p.km>=10&&p.km<18).length,55],["Sud 77 / Melun",near.filter(p=>p.km>=18).length,40]];

   <div class="mv" style="background:${portrait(p)||"none"} center 18%/cover no-repeat">${portrait(p)?"":ini(p)}</div><div class="mveil"></div>
   <div class="mi"><div style="display:flex;align-items:center;gap:6px">${esc(p.pseudo.split("&")[0])}, ${p.age} ${p.online&&S.settings.online?'<span class="dot-online"></span>':""}</div>
   <small>${typeLabel(p)} · ~${p.km} km</small></div></div>`}
function placeBlips(){
  const r=$("#radar");if(!r)return;
  PROFILES.slice(0,8).forEach((p,i)=>{
    const ang=(i/8)*Math.PI*2+.5, d=30+p.km*2.6;
    const b=document.createElement("div");b.className="blip";
    b.style.left=`calc(50% + ${Math.cos(ang)*d}px)`;b.style.top=`calc(50% + ${Math.sin(ang)*d*0.7}px)`;
    b.innerHTML=ava(p,"sm");b.onclick=()=>openProfile(p.id);
    r.appendChild(b);
  });
}
function evtHTML(){
  return `<div style="height:14px"></div>`+EVENTS.map(e=>{

function openChat(pid){
  let c=CONVOS.find(x=>x.pid===pid);
  if(!c){c={id:"c"+Date.now(),pid,unread:0,msgs:[]};CONVOS.push(c)}
  c.unread=0;S.chatOpen=pid;const p=P(pid);
  screen("chat",`
   <div class="chat-head">
     <button class="icon-btn" style="width:38px;height:38px" onclick="go('msgs')">←</button>
     ${ava(p,"sm")}
     <div style="flex:1;cursor:pointer" onclick="openProfile(${pid})">
       <b style="font-weight:500;font-size:15px">${esc(p.pseudo)}</b>
       <p style="font-size:11.5px;color:${p.online?"var(--ok)":"var(--dim)"}">${p.online?"En ligne":p.last}</p>
     </div>
     <button class="icon-btn" style="width:38px;height:38px" onclick="chatMenu(${pid})">⋯</button>
   </div>
   <div class="chat-body" id="chatBody">
     <span class="chat-day">Conversation sécurisée · captures découragées</span>
     ${c.msgs.map(m=>`<div class="bub ${m.me?"me":"them"}">${esc(m.t)}<time>${m.h}</time></div>`).join("")}
   </div>
   <div class="composer">
     <button class="icon-btn" style="width:44px;height:44px" onclick="toast('📷 Photo éphémère envoyée (simulation)')">📷</button>
     <input id="chatInput" placeholder="Écrire avec élégance…" onkeydown="if(event.key==='Enter')sendMsg()">
     <button class="send" onclick="sendMsg()">➤</button>
   </div>`);
  show("chat");renderTabbar();
  const b=$("#chatBody");b.scrollTop=b.scrollHeight;
}
const REPLIES=["Voilà qui est bien tourné… continuez.","J'aime cette façon de voir les choses.","Vous êtes plutôt vin ou champagne, pour situer le personnage ?","On pourrait en parler de vive voix, un de ces soirs.","Intéressant. Et audacieux — ça me plaît.","Je note. Vous marquez des points."];
function sendMsg(){
  const inp=$("#chatInput"),t=inp.value.trim();if(!t)return;
  const c=CONVOS.find(x=>x.pid===S.chatOpen);const now=new Date();
  const h=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
  c.msgs.push({me:true,t,h});inp.value="";
  const b=$("#chatBody");b.insertAdjacentHTML("beforeend",`<div class="bub me">${esc(t)}<time>${h}</time></div>`);b.scrollTop=b.scrollHeight;
  setTimeout(()=>{const r=REPLIES[Math.floor(Math.random()*REPLIES.length)];
    c.msgs.push({me:false,t:r,h});
    if(S.chatOpen===c.pid&&document.getElementById("sc-chat").classList.contains("active")){
      b.insertAdjacentHTML("beforeend",`<div class="bub them">${esc(r)}<time>${h}</time></div>`);b.scrollTop=b.scrollHeight}
  },1400+Math.random()*1600);
}

}
